name: Deploy site to GitHub Pages

# main への push（または手動実行）で site/ を生成して GitHub Pages へ公開する。
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限。
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に走るデプロイは最新の1本だけにする（古い実行は中断）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # docs/*.md から site/js/data.js を再生成する。
      - name: Build data.js
        run: node site/build.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 公開対象は site/ ディレクトリのみ。
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
